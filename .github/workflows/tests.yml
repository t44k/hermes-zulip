name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: hermes-zulip

      - name: Checkout hermes-agent (for gateway/* imports)
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: hermes-agent
          # Pin to a known-good release; bump as needed.
          ref: main

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx pyyaml
          # Pull in whatever else hermes-agent's gateway.config / platforms.base needs.
          # The plugin tests don't actually exercise the upstream test suite, just import a few modules.
          if [ -f hermes-agent/requirements.txt ]; then
            pip install -r hermes-agent/requirements.txt || true
          fi

      - name: Run plugin tests
        env:
          PYTHONPATH: ${{ github.workspace }}/hermes-agent
          # Make sure no real ZULIP_* creds leak into the test env
          ZULIP_SITE: ""
          ZULIP_EMAIL: ""
          ZULIP_API_KEY: ""
        working-directory: hermes-zulip
        run: |
          python tests/run_tests.py
